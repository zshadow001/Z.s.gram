<!DOCTYPE html>
<html>
<head>
    <title>Telegram Panel</title>

    <style>
        body{
            background:#0f172a;
            color:white;
            font-family:Arial;
            text-align:center;
            margin-top:60px;
        }

        .card{
            width:320px;
            margin:auto;
            background:#1e293b;
            padding:25px;
            border-radius:15px;
        }

        .btn{
            display:block;
            margin:10px auto;
            padding:12px;
            width:200px;
            background:#2563eb;
            color:white;
            text-decoration:none;
            border-radius:8px;
            font-weight:bold;
        }

        .btn:hover{
            opacity:0.9;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>Telegram Connected ✅</h1>

    <p><b>Name:</b> {{name}}</p>
    <p><b>Username:</b> @{{username}}</p>
    <p><b>Phone:</b> +{{phone}}</p>

    <hr>

    <a class="btn" href="/profile">👤 Profile</a>

    <a class="btn" href="/chats">💬 Chats</a>

    <a class="btn" href="/channels">📢 Channels</a>

</div>

</body>
</html>
